name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
          - platform: windows-2022

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure macOS native build stability
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "WHISPER_NATIVE=OFF" >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install vulkan-sdk --yes --no-progress --limit-output

          $searchRoots = @(
            "C:\\VulkanSDK",
            "$env:ProgramFiles\\VulkanSDK",
            "${env:ProgramFiles(x86)}\\VulkanSDK"
          )

          $versionDirs = @()
          foreach ($root in $searchRoots) {
            if (Test-Path $root) {
              $versionDirs += Get-ChildItem $root -Directory -ErrorAction SilentlyContinue
            }
          }

          if ($versionDirs.Count -eq 0) {
            throw "Could not find an installed Vulkan SDK directory."
          }

          $sdkRoot = ($versionDirs | Sort-Object Name -Descending | Select-Object -First 1).FullName

          if (-not (Test-Path (Join-Path $sdkRoot "Lib"))) {
            throw "Vulkan SDK found at '$sdkRoot' but missing Lib directory."
          }

          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: Fing ${{ steps.release_tag.outputs.tag }}
          releaseBody: See the assets to download this version and update metadata.
          releaseDraft: false
          prerelease: false
