name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
          - platform: windows-2022

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release type
        id: release_type
        shell: bash
        run: |
          if [[ "${{ steps.release_tag.outputs.tag }}" == *-rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve bundle args
        id: bundle_args
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            if [ "${{ steps.release_type.outputs.prerelease }}" = "true" ]; then
              echo "args=--bundles nsis" >> "$GITHUB_OUTPUT"
            else
              echo "args=--bundles nsis,msi" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          echo "WHISPER_NATIVE=OFF" >> "$GITHUB_ENV"
          echo "CMAKE_CROSSCOMPILING=ON" >> "$GITHUB_ENV"
          echo "WHISPER_CCACHE=OFF" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=1" >> "$GITHUB_ENV"
          echo "NUM_JOBS=1" >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.4.309.0"
          $installer = "$env:TEMP\VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "CARGO_TARGET_DIR=C:\t" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: Fing ${{ steps.release_tag.outputs.tag }}
          releaseBody: See the assets to download this version and update metadata.
          releaseDraft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          args: ${{ steps.bundle_args.outputs.args }}


