name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            updater_json_keep_universal: true
          - platform: windows-2022
            updater_json_keep_universal: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out release tag
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "${{ steps.release_tag.outputs.tag }}"

      - name: Resolve release type
        id: release_type
        shell: bash
        run: |
          if [[ "${{ steps.release_tag.outputs.tag }}" == *-rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Tauri args
        id: tauri_args
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "args=--target universal-apple-darwin" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.release_type.outputs.prerelease }}" = "true" ]; then
            echo "args=--bundles nsis" >> "$GITHUB_OUTPUT"
          else
            echo "args=--bundles nsis,msi" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches version files
        run: bun run release:verify-tag "${{ steps.release_tag.outputs.tag }}"

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo "body<<EOF"
            bun run release:notes "${{ steps.release_tag.outputs.tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal Rust targets
        if: runner.os == 'macOS'
        shell: bash
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Configure macOS build
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/fing-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          existing_keychains="$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')"
          security list-keychains -d user -s "$keychain_path" $existing_keychains
          security default-keychain -d user -s "$keychain_path"

          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$signing_identity" ]; then
            echo "No Developer ID Application signing identity found in the imported certificate"
            security find-identity -v -p codesigning "$keychain_path"
            exit 1
          fi

          echo "Using signing identity: $signing_identity"
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=1" >> "$GITHUB_ENV"
          echo "CMAKE_CROSSCOMPILING=ON" >> "$GITHUB_ENV"
          echo "WHISPER_CCACHE=OFF" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=1" >> "$GITHUB_ENV"
          echo "NUM_JOBS=1" >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.4.309.0"
          $installer = "$env:TEMP\VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      - name: Configure Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Keep Cargo's output path short enough for MSBuild's FileTracker in
          # whisper-rs-sys's nested Vulkan helper build.
          New-Item -ItemType Directory -Force -Path 'D:\t' | Out-Null
          echo "CARGO_TARGET_DIR=D:\t" >> $env:GITHUB_ENV

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: Fing ${{ steps.release_tag.outputs.tag }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          updaterJsonKeepUniversal: ${{ matrix.updater_json_keep_universal }}
          args: ${{ steps.tauri_args.outputs.args }}

      - name: Verify macOS signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          app_path="$(find src-tauri/target -type d -path '*/release/bundle/macos/Fing.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Fing.app was not found in src-tauri/target"
            find src-tauri/target \( -name '*.app' -o -name '*.dmg' \) -print
            exit 1
          fi

          dmg_path="$(find src-tauri/target -type f -path '*/release/bundle/dmg/*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "DMG artifact was not found in src-tauri/target"
            find src-tauri/target \( -name '*.app' -o -name '*.dmg' \) -print
            exit 1
          fi

          echo "Verifying code signature for $app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"
          signature_info="$(codesign -dv --verbose=4 "$app_path" 2>&1)"
          echo "$signature_info"

          if echo "$signature_info" | grep -q 'Signature=adhoc'; then
            echo "The app is still ad-hoc signed"
            exit 1
          fi

          if ! echo "$signature_info" | grep -q 'Authority=Developer ID Application'; then
            echo "The app is not signed with a Developer ID Application certificate"
            exit 1
          fi

          if ! echo "$signature_info" | grep -q '^TeamIdentifier=' || echo "$signature_info" | grep -q '^TeamIdentifier=not set'; then
            echo "The app signature is missing a TeamIdentifier"
            exit 1
          fi

          echo "Final app entitlements:"
          entitlements_path="$RUNNER_TEMP/Fing.entitlements.plist"
          codesign -d --entitlements :- "$app_path" > "$entitlements_path"
          cat "$entitlements_path"

          unexpected_entitlements="$(/usr/libexec/PlistBuddy -c 'Print' "$entitlements_path" \
            | awk -F '= ' '/com\\.apple\\.security\\./ { print $1 }' \
            | tr -d ' ' \
            | grep -v '^com.apple.security.device.audio-input$' || true)"

          if [ -n "$unexpected_entitlements" ]; then
            echo "Unexpected production entitlements found:"
            echo "$unexpected_entitlements"
            exit 1
          fi

          echo "Assessing Gatekeeper policy"
          spctl --assess --type execute --verbose=4 "$app_path"

          echo "Validating stapled tickets"
          xcrun stapler validate "$app_path"
          echo "Submitting DMG for notarization"
          xcrun notarytool submit "$dmg_path" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"

          echo "Replacing release DMG with stapled artifact"
          gh release upload "$RELEASE_TAG" "$dmg_path" --clobber
